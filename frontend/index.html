<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#1d4ed8" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <title>調査アプリ</title>
  <link rel="stylesheet" href="style.css" />
  <!-- Markdownパーサー（script.js で loadManual() が使うため先に読み込む） -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
  <div class="app">
    <!-- Header -->
    <div class="header glass">
      <div class="brand">
        <div class="logo" aria-hidden="true"></div>
        <div class="brand-name">調査アプリ</div>
      </div>
      <button class="pill" id="menuOpen">メニュー</button>
    </div>

    <!-- Progress -->
    <div class="progress">
      <div class="glass progbox">
        <div class="progline">
          <div class="progtext">進捗 <span id="pc">0</span>/<span id="pt">5</span></div>
          <div class="track"><div class="bar" id="bar"></div></div>
        </div>
      </div>
    </div>

    <!-- Screens -->
    <div class="content">
      <!-- Manual -->
      <section id="screen-manual" class="screen active">
        <div class="glass card">
          <h3 class="section-title">マニュアル</h3>
          <div id="manualMD" class="markdown-body">読み込み中…</div>
        </div>
      </section>

      <!-- Survey -->
      <section id="screen-survey" class="screen">
        <div class="glass card" style="display:flex;flex-direction:column;gap:12px">
          <!-- 進捗に応じた現在の指示（script.js の updateStepBox で制御） -->
          <div id="stepBox" class="step-box" style="display:none">
            <div class="num" id="stepNum">1</div>
            <div class="txt" id="stepTxt">指示を読み込み中…</div>
          </div>

          <label for="tb" class="subtle">TextBox</label>
          <textarea id="tb" class="textarea" placeholder="観察内容や指示に従って入力…"></textarea>
          <button class="btn ghost" id="instBtn">指示</button>
        </div>

        <div class="glass card" id="doneCard" style="display:none;text-align:center">
          <h3 class="section-title">全てのタスクを完了しました。</h3>
          <p class="subtle">内容に問題がなければ、調査を終了してください。</p>
          <button class="btn danger" id="endBtn">調査を終了する</button>
        </div>

        <button class="btn" id="submitBtn">提出</button>
      </section>

      <!-- Chat -->
      <section id="screen-chat" class="screen">
        <div class="glass card chat-wrap">
          <div class="subtle">回答</div>
          <div class="chatbox">
            <div class="bubbles" id="chatList">
              <div class="bubble bot">質問をどうぞ</div>
            </div>
          </div>
          <div class="inputrow" style="display:flex; gap:10px">
            <input id="qInput" class="textarea" style="min-height:auto; height:46px" type="text" placeholder="質問内容" />
            <button class="btn" id="sendBtn" style="width:34%">質問</button>
          </div>
        </div>
      </section>

      <!-- History -->
      <section id="screen-history" class="screen">
        <div class="glass card">
          <div class="subtle" style="margin-bottom:8px">質問履歴</div>
          <div id="hist"></div>
        </div>
      </section>

      <!-- Finish -->
      <section id="screen-finish" class="screen">
        <div class="glass card center">
          <div>
            <h1>全てのタスクを完了しました。</h1>
            <p class="subtle">お疲れ様でした！<br>ブラウザを閉じてください。</p>
          </div>
        </div>
      </section>
    </div>
  </div>

  <!-- FAB（質問ショートカット。画面に応じて表示/位置を自動調整） -->
  <button class="fab" id="fabAsk" aria-label="質問する">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M8 10a4 4 0 1 1 6 3.46V15M12 19h.01"/>
    </svg>
  </button>

  <!-- Overlay + Bottom Sheet Menu（終了は含めない） -->
  <div class="overlay" id="overlay"></div>
  <div class="sheet glass" id="sheet">
    <span class="handle"></span>
    <a class="menu-item" data-screen="manual">
      <span class="icon" aria-hidden="true">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M4 4v15.5A2.5 2.5 0 0 1 6.5 17H20V6a2 2 0 0 0-2-2H6"/>
        </svg>
      </span>
      <div>マニュアル表示</div>
    </a>
    <a class="menu-item" data-screen="survey">
      <span class="icon" aria-hidden="true">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="4" width="18" height="14" rx="2"/><path d="M8 21h8"/>
        </svg>
      </span>
      <div>調査実施</div>
    </a>
    <a class="menu-item" data-screen="chat">
      <span class="icon" aria-hidden="true">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21 15a4 4 0 0 1-4 4H7l-4 4V7a4 4 0 0 1 4-4h10a4 4 0 0 1 4 4z"/>
        </svg>
      </span>
      <div>質問Chat</div>
    </a>
    <a class="menu-item" data-screen="history">
      <span class="icon" aria-hidden="true">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M3 5h18M3 10h18M3 15h10"/>
        </svg>
      </span>
      <div>質問履歴</div>
    </a>
  </div>

  <!-- Modals -->
  <div class="modal" id="confirmModal">
    <div class="box">
      <div class="head">提出しますか？</div>
      <div class="body">内容を確認のうえ提出してください。</div>
      <div class="row">
        <button class="btn ghost" data-close>いいえ</button>
        <button class="btn" id="confirmYes">はい</button>
      </div>
    </div>
  </div>

  <div class="modal" id="exitModal">
    <div class="box">
      <div class="head">調査を終了しますか？</div>
      <div class="body">終了すると進捗はリセットされます。</div>
      <div class="row">
        <button class="btn ghost" data-close>キャンセル</button>
        <button class="btn danger" id="exitYes">終了する</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast">提出しました！</div>

  <!-- アプリロジック -->
  <script src="script.js"></script>
</body>
</html>

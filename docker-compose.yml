version: "3.9"

services:
  db:
    build: 
      context: ./containers/db
      dockerfile: dockerfile
    volumes:
      - ./containers/db:/db
    


  api:
    build:
      context: ./containers/api
      dockerfile: dockerfile
    # env_file: .env
    # environment:
    volumes:
      - ./:/workspace
    working_dir: /workspace/containers/backend
    command: tail -f /dev/null
    ports:
      - 8080:8080
    deploy:
      resources:
        reservations:
          devices:
            - capabilities: [gpu]

    # core dumpを防ぐ為の設定
    shm_size: 8GB
